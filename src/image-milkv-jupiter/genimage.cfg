image ukoos.img {
	hdimage {
		partition-table-type = "gpt"
	}
	partition bootinfo {
        offset = 0
        in-partition-table = false
		image = "bootinfo_sd.bin"
		size = 80
	}
	partition fsbl {
        offset = "128K"
		image = "FSBL.bin"
		size = 256K
	}
	partition env {
		# When we can use genimage version 19, replace with 'u-boot-env,' version 19 will come with NixOS 22.11
		partition-type-uuid = "3de21764-95bd-54bd-a5c3-4abe786f38a8"
		offset = "384K"
		image = "uboot.env"
		size = 256K
	}
	partition opensbi {
        offset = "1M"
		image = "fw_dynamic.itb"
		size = 1M
	}
	partition uboot {
        offset = "2M"
		image = "u-boot.itb"
		size = 2M
	}
}
