image: alpine/3.21
arch: x86_64
packages:
  - binutils-riscv-none-elf
  - coreutils
  - gcc-riscv-none-elf
  - qemu-system-riscv64
  - zstd
sources:
  - https://git.sr.ht/~remexre/ukoos
tasks:
  - build: |
      export SOURCE_DATE_EPOCH=$(git -C ukoos log -1 --pretty=%ct)
      shortrev=$(git -C ukoos rev-parse --short HEAD)
      mkdir build
      cd build
      ../ukoos/configure
      make -j$(nproc) -l$(nproc)
      mkdir ukoos-git-$shortrev
      make DESTDIR=$(realpath ukoos-git-$shortrev) install
      tar --create --file ukoos-git-$shortrev.tar \
          --format posix \
          --pax-option=exthdr.name=%d/PaxHeaders/%f,delete=atime,delete=ctime \
          --mtime "@$SOURCE_DATE_EPOCH" \
          --sort name \
          --owner 0 --group 0 --numeric-owner \
          ukoos-git-$shortrev
      zstd -19 --threads=0 ukoos-git-$shortrev.tar
      sha256sum ukoos-git-$shortrev.tar ukoos-git-$shortrev.tar.zst
      cp ukoos-git-$shortrev.tar.zst ../ukoos-git.tar.zst
artifacts:
  - ukoos-git.tar.zst
